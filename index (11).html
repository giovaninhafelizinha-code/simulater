<title>Nexo</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f5f5f5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  padding: 24px 12px;
}

.phone {
  width: 355px;
  background: #1a1a1a;
  border-radius: 50px;
  padding: 10px;
  box-shadow:
    0 0 0 1px #2a2a2a,
    0 0 0 2px #111,
    inset 0 0 0 1px #333,
    0 30px 80px rgba(0,0,0,0.25);
  position: relative;
}
.phone::before {
  content: "";
  position: absolute; left: -3px; top: 100px;
  width: 3px; height: 32px;
  background: #2a2a2a; border-radius: 3px 0 0 3px;
  box-shadow: 0 44px 0 #2a2a2a;
}
.phone::after {
  content: "";
  position: absolute; right: -3px; top: 130px;
  width: 3px; height: 56px;
  background: #2a2a2a; border-radius: 0 3px 3px 0;
}

.phone-inner {
  background: #fff;
  border-radius: 42px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: 660px;
  position: relative;
}

.dynamic-island {
  position: absolute; top: 10px; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 34px;
  background: #fff; border-radius: 20px; z-index: 30;
}

.sbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 52px 20px 4px;
  font-size: 12px; font-weight: 600; color: #0f1419;
  flex-shrink: 0;
}
.sbar-icons { display: flex; align-items: center; gap: 5px; }

.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 16px 8px;
  border-bottom: 0.5px solid #eff3f4;
  flex-shrink: 0;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
}
.app-logo { display: flex; align-items: center; justify-content: center; }
.app-logo img { filter: brightness(10); }

.hbtn {
  background: none; border: none; cursor: pointer;
  color: #536471; padding: 6px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.hbtn:hover { background: #f7f9f9; color: #0f1419; }

.nav-tabs { display: flex; border-bottom: 0.5px solid #eff3f4; flex-shrink: 0; }
.nav-tab {
  flex: 1; padding: 12px 0; text-align: center;
  font-size: 13px; font-weight: 500; color: #536471;
  cursor: default; position: relative;
}
.nav-tab.active { color: #0f1419; font-weight: 700; }
.nav-tab.active::after {
  content: ""; position: absolute; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 56px; height: 3px; background: #1d9bf0;
  border-radius: 3px 3px 0 0;
}

.pbar { height: 2px; background: #eff3f4; flex-shrink: 0; }
.pfill { height: 100%; background: #1d9bf0; transition: width 0.4s ease; }
.slabel { text-align: center; font-size: 11px; color: #536471; padding: 3px 0 2px; flex-shrink: 0; }

.feed { flex: 1; overflow-y: auto; overflow-x: hidden; }
.feed::-webkit-scrollbar { width: 0; }

.post-card {
  padding: 12px 16px; border-bottom: 0.5px solid #eff3f4;
  display: flex; gap: 10px; transition: background 0.1s;
}
.post-card:hover { background: #f7f9f9; }

.avatar {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px; color: #fff;
}

.post-right { flex: 1; min-width: 0; }
.post-header { display: flex; align-items: center; gap: 4px; margin-bottom: 1px; flex-wrap: nowrap; overflow: hidden; }
.post-name { font-size: 14px; font-weight: 700; color: #0f1419; white-space: nowrap; }
.post-handle, .post-dot, .post-time { font-size: 13px; color: #536471; white-space: nowrap; }
.post-more { margin-left: auto; color: #536471; background: none; border: none; cursor: pointer; padding: 0 2px; font-size: 16px; line-height: 1; }

.post-text { font-size: 15px; color: #0f1419; line-height: 1.55; margin-bottom: 10px; word-break: break-word; margin-top: 2px; }

.post-actions { display: flex; justify-content: space-between; max-width: 280px; }
.abtn {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px; color: #536471;
  cursor: pointer; background: none; border: none;
  padding: 4px 6px; border-radius: 50px;
  transition: color 0.15s, background 0.15s;
}
.abtn:hover { background: rgba(29,155,240,0.1); color: #1d9bf0; }
.abtn.like:hover { background: rgba(249,24,128,0.1); color: #f91880; }
.abtn.repost:hover { background: rgba(0,186,124,0.1); color: #00ba7c; }
.abtn.liked { color: #f91880; }
.abtn.reposted { color: #00ba7c; }

.comment-area {
  border-top: 0.5px solid #eff3f4;
  padding: 10px 14px 12px; background: #fff; flex-shrink: 0;
}
.reply-label { font-size: 12px; color: #536471; margin-bottom: 8px; }
.reply-label span { color: #1d9bf0; }
.crow { display: flex; align-items: flex-start; gap: 10px; }
.cav {
  width: 36px; height: 36px; border-radius: 50%;
  background: #1d9bf0; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 14px; font-weight: 700; margin-top: 2px;
}
.cinput-wrap { flex: 1; }
.cinput {
  width: 100%; background: transparent; border: none;
  font-size: 18px; color: #0f1419; resize: none; outline: none;
  line-height: 1.4; min-height: 40px; max-height: 100px;
  font-family: inherit; caret-color: #1d9bf0;
}
.cinput::placeholder { color: #536471; font-size: 18px; }

.action-bar {
  display: flex; align-items: center;
  margin-top: 8px; padding-top: 8px;
  border-top: 0.5px solid #eff3f4;
}
.media-btns { display: flex; gap: 2px; flex: 1; }
.mbtn {
  background: none; border: none; cursor: pointer;
  color: #1d9bf0; padding: 6px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.mbtn:hover { background: rgba(29,155,240,0.1); }
.fmt-btn.active { background: rgba(29,155,240,0.15); color: #1d9bf0; }

.char-ring { width: 20px; height: 20px; margin-right: 12px; }

.pub-btn {
  background: #1d9bf0; color: #fff; border: none;
  border-radius: 22px; padding: 7px 16px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: background 0.15s, opacity 0.15s; line-height: 1;
}
.pub-btn:hover { background: #1a8cd8; }
.pub-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* overlay */
.overlay {
  position: absolute; inset: 0; background: #fff; border-radius: 42px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 18px; padding: 32px; z-index: 20;
}
.ov-logo { display: flex; align-items: center; justify-content: center; }
.ov-logo img { filter: brightness(10); }
.ov-title { font-size: 22px; font-weight: 800; color: #0f1419; text-align: center; }
.ov-sub { font-size: 14px; color: #536471; text-align: center; line-height: 1.5; }
.id-input {
  border: 1.5px solid #2f3336; border-radius: 6px;
  padding: 12px 16px; font-size: 20px; font-weight: 700;
  text-align: center; width: 160px; color: #0f1419;
  background: #16181c; outline: none; letter-spacing: 3px; font-family: inherit;
}
.id-input:focus { border-color: #1d9bf0; }
.start-btn {
  background: #e7e9ea; color: #000; border: none;
  border-radius: 22px; padding: 12px 0; width: 100%;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: background 0.15s; max-width: 240px;
}
.start-btn:hover { background: #d0d3d6; }
.start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* results */
.results-screen { padding: 16px; overflow-y: auto; flex: 1; }
.results-screen::-webkit-scrollbar { width: 0; }
.rt { font-size: 20px; font-weight: 800; color: #0f1419; margin-bottom: 4px; }
.rsub { font-size: 14px; color: #536471; margin-bottom: 16px; }
.ritem { background: #16181c; border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; border: 0.5px solid #eff3f4; }
.rlabel { font-size: 11px; color: #536471; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
.rpost { font-size: 12px; color: #536471; margin-bottom: 6px; font-style: italic; padding-bottom: 6px; border-bottom: 0.5px solid #eff3f4; }
.rreply { font-size: 14px; color: #0f1419; line-height: 1.4; }
.smsg { font-size: 13px; text-align: center; padding: 10px; border-radius: 10px; margin-top: 8px; font-weight: 500; }
.s-ok { background: #0d2d1a; color: #00ba7c; border: 0.5px solid #00ba7c44; }
.s-err { background: #2d0d0d; color: #f4212e; border: 0.5px solid #f4212e44; }
.s-sending { background: #0d1d2d; color: #1d9bf0; border: 0.5px solid #1d9bf044; }
.reset-btn {
  width: 100%; margin-top: 14px; background: #1d9bf0; color: #fff;
  border: none; border-radius: 22px; padding: 12px;
  font-size: 15px; font-weight: 700; cursor: pointer;
}
.reset-btn:hover { background: #1a8cd8; }
</style>

let step = 0, pid = "", answers = [], likedSet = new Set(), repostedSet = new Set();

function updateClock() {
  const now = new Date();
  document.getElementById("clockDisplay").textContent =
    now.getHours().toString().padStart(2,"0") + ":" +
    now.getMinutes().toString().padStart(2,"0");
}
updateClock(); setInterval(updateClock, 15000);

const pidInput = document.getElementById("pidInput");
const startBtn = document.getElementById("startBtn");
pidInput.addEventListener("input", () => { startBtn.disabled = pidInput.value.trim().length === 0; });
pidInput.addEventListener("keydown", e => { if (e.key === "Enter" && !startBtn.disabled) startBtn.click(); });
startBtn.addEventListener("click", () => {
  pid = pidInput.value.trim().toUpperCase();
  document.getElementById("idScreen").style.display = "none";
  document.getElementById("commentArea").style.display = "block";
  renderPost(0); updateProgress();
});

function fmtNum(n) {
  if (n >= 1000) return (n/1000).toFixed(1).replace(".0","") + "K";
  return n;
}

function renderPost(idx) {
  const p = posts[idx];
  const lk = likedSet.has(p.id), rp = repostedSet.has(p.id);
  document.getElementById("replyHandle").textContent = p.handle;
  document.getElementById("feedArea").innerHTML = `
    <div class="post-card">
      <div style="display:flex;flex-direction:column;align-items:center;gap:0">
        <div class="avatar" style="background:${p.color}">${p.initials}</div>
        <div style="width:2px;flex:1;background:#cfd9de;margin-top:4px;min-height:16px;border-radius:1px"></div>
      </div>
      <div class="post-right">
        <div class="post-header">
          <span class="post-name">${p.name}</span>
          <span class="post-handle">${p.handle}</span>
          <span class="post-dot">·</span>
          <span class="post-time">${p.time}</span>
          <button class="post-more">···</button>
        </div>
        <p class="post-text">${p.text}</p>
        <div class="post-actions">
          <button class="abtn" aria-label="Comentários">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>${fmtNum(p.replies)}</span>
          </button>
          <button class="abtn repost ${rp?"reposted":""}" onclick="toggleRepost(${p.id},this)" aria-label="Repostar">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="17,1 21,5 17,9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7,23 3,19 7,15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            <span id="rcount${p.id}">${fmtNum(rp?p.reposts+1:p.reposts)}</span>
          </button>
          <button class="abtn like ${lk?"liked":""}" onclick="toggleLike(${p.id},this)" aria-label="Curtir">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="${lk?"#f91880":"none"}" stroke="${lk?"#f91880":"currentColor"}" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span id="lcount${p.id}">${fmtNum(lk?p.likes+1:p.likes)}</span>
          </button>
          <button class="abtn" aria-label="Visualizações">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <span>${p.views}</span>
          </button>
          <button class="abtn" aria-label="Compartilhar">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16,6 12,2 8,6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          </button>
        </div>
      </div>
    </div>`;
}

function toggleLike(id, btn) {
  const p = posts.find(x=>x.id===id);
  const count = document.getElementById("lcount"+id);
  const svg = btn.querySelector("svg");
  if (likedSet.has(id)) {
    likedSet.delete(id); btn.classList.remove("liked");
    svg.setAttribute("fill","none"); svg.setAttribute("stroke","currentColor");
    count.textContent = fmtNum(p.likes);
  } else {
    likedSet.add(id); btn.classList.add("liked");
    svg.setAttribute("fill","#f91880"); svg.setAttribute("stroke","#f91880");
    count.textContent = fmtNum(p.likes+1);
  }
}

function toggleRepost(id, btn) {
  const p = posts.find(x=>x.id===id);
  const count = document.getElementById("rcount"+id);
  if (repostedSet.has(id)) {
    repostedSet.delete(id); btn.classList.remove("reposted");
    count.textContent = fmtNum(p.reposts);
  } else {
    repostedSet.add(id); btn.classList.add("reposted");
    count.textContent = fmtNum(p.reposts+1);
  }
}

function updateProgress() {
  const pct = ((step+1)/posts.length)*100;
  document.getElementById("pFill").style.width = pct+"%";
  document.getElementById("sLabel").textContent = "Post "+(step+1)+" de "+posts.length;
}

const cInput = document.getElementById("cInput");
const pubBtn = document.getElementById("pubBtn");
const charArc = document.getElementById("charArc");
const circumference = 50.27;

function htmlToMarkdown(html) {
  return html
    .replace(/<b>(.*?)<\/b>/gi, "**$1**")
    .replace(/<strong>(.*?)<\/strong>/gi, "**$1**")
    .replace(/<i>(.*?)<\/i>/gi, "_$1_")
    .replace(/<em>(.*?)<\/em>/gi, "_$1_")
    .replace(/<br\s*\/?>/gi, "\n")
    .replace(/<[^>]+>/g, "")
    .replace(/&nbsp;/g, " ")
    .replace(/&lt;/g, "<")
    .replace(/&gt;/g, ">")
    .replace(/&amp;/g, "&")
    .trim();
}

function syncInput() {
  const text = cInput.innerText.trim();
  const len = text.length;
  pubBtn.disabled = len === 0;
  const pct = Math.min(len / 280, 1);
  charArc.style.strokeDashoffset = circumference - (pct * circumference);
  charArc.style.stroke = pct > 0.9 ? "#f4212e" : pct > 0.7 ? "#ffd400" : "#1d9bf0";
}

cInput.addEventListener("input", syncInput);

cInput.addEventListener("keydown", (e) => {
  if (cInput.innerText.length >= 280 && e.key !== "Backspace" && e.key !== "Delete" && !e.ctrlKey) {
    e.preventDefault();
  }
});

pubBtn.addEventListener("click", () => {
  const markdown = htmlToMarkdown(cInput.innerHTML);
  if (!markdown) return;
  answers.push(markdown);
  cInput.innerHTML = "";
  charArc.style.strokeDashoffset = circumference;
  pubBtn.disabled = true;
  likedSet.clear(); repostedSet.clear();
  step++;
  if (step < posts.length) { renderPost(step); updateProgress(); }
  else showResults();
});

async function sendToSheets(payload) {
  try {
    await fetch(SHEETS_URL, { method:"POST", body:JSON.stringify(payload), mode:"no-cors" });
    return true;
  } catch(e) { return false; }
}

async function showResults() {
  document.getElementById("pFill").style.width = "100%";
  document.getElementById("sLabel").textContent = "Sessão concluída";
  document.getElementById("feedArea").innerHTML = "";
  document.getElementById("commentArea").style.display = "none";

  const rDiv = document.createElement("div");
  rDiv.className = "results-screen";
  let html = `<div class="rt">Sessão concluída</div><div class="rsub">Participante: ${pid}</div>`;
  answers.forEach((ans,i) => {
    const p = posts[i];
    html += `<div class="ritem">
      <div class="rlabel">Post ${i+1} · ${p.handle}</div>
      <div class="rpost">${p.text.substring(0,80)}...</div>
      <div class="rreply">${ans}</div>
    </div>`;
  });
  html += `<div class="smsg s-sending" id="sendStatus">Enviando dados...</div>`;
  html += `<button class="reset-btn" onclick="resetApp()">Próximo participante</button>`;
  rDiv.innerHTML = html;
  document.getElementById("phoneInner").appendChild(rDiv);

  const ok = await sendToSheets({id:pid,r1:answers[0],r2:answers[1],r3:answers[2],r4:answers[3],r5:answers[4],r6:answers[5]});
  const st = document.getElementById("sendStatus");
  st.className = ok?"smsg s-ok":"smsg s-err";
  st.textContent = ok?"✓ Dados salvos na planilha":"⚠ Erro no envio — verifique a conexão";
}

function applyFmt(type) {
  const input = document.getElementById("cInput");
  input.focus();
  if (type === "bold") document.execCommand("bold", false, null);
  else document.execCommand("italic", false, null);
  syncInput();
}

function resetApp() {
  step=0; pid=""; answers=[]; likedSet.clear(); repostedSet.clear();
  const rs = document.querySelector(".results-screen");
  if (rs) rs.remove();
  document.getElementById("feedArea").innerHTML="";
  document.getElementById("commentArea").style.display="none";
  document.getElementById("pFill").style.width="0%";
  document.getElementById("sLabel").textContent="Carregando...";
  cInput.innerHTML="";
  charArc.style.strokeDashoffset=circumference;
  pubBtn.disabled=true;
  document.getElementById("idScreen").style.display="flex";
  document.getElementById("pidInput").value="";
  document.getElementById("startBtn").disabled=true;
}
</script>
</body>
</html>
